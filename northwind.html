<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Northwind Dashboard — Modern Dark UI</title>
<!-- Prevent mobile zoom on focus -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<!-- Required libs (must be present next to this file) -->
<script src="/assets/sql-wasm.js"></script>
<script src="/assets/chart.umd.min.js"></script>

<style>
/* -------------------------
   Theme & base
   ------------------------- */
:root{
  --bg:#0f1113;
  --panel:#17181a;
  --panel-2:#1f2123;
  --accent:#5b6cff;
  --accent-2:#16a34a;
  --muted:#9aa0a6;
  --text:#e6eef3;
  --border:#243138;
  --header-h:52px;
  --footer-h:36px;
  --sidebar-w:44px;
  --sidebar-expanded-w:200px;
  --trans: 250ms cubic-bezier(.2,.9,.25,1);
  --radius:8px;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial;
  background:var(--bg);
  color:var(--text);
  display:flex;
  height:100vh;
  overflow:hidden; /* keep everything inside viewport */
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* -------------------------
   Sidebar
   ------------------------- */
#sidebar{
  width:var(--sidebar-w);
  min-width:var(--sidebar-w);
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:8px 6px;
  gap:6px;
  transition:width var(--trans), background var(--trans);
  overflow:visible;
  position:relative;
}
#sidebar.expanded{
  width:var(--sidebar-expanded-w);
  min-width:var(--sidebar-expanded-w);
}
#sidebar button {
  width:100%;
  display:flex;
  gap:10px;
  align-items:center;
  background:transparent;
  border:none;
  color:var(--text);
  padding:8px 10px;
  border-radius:6px;
  cursor:pointer;
  transition:background var(--trans), transform 80ms;
  font-size:16px; /* >=16px to avoid mobile zoom */
}
#sidebar button:active{ transform:translateY(1px) }
#sidebar button:hover{ background:rgba(255,255,255,0.02) }
#sidebar svg{ width:20px;height:20px;flex-shrink:0; color:var(--muted) }
#sidebar span { font-size:0.95rem; color:var(--text); white-space:nowrap; transition:opacity var(--trans), transform var(--trans); }
#sidebar:not(.expanded) span { opacity:0; transform:translateX(-6px); pointer-events:none; }

/* Tooltip when collapsed using data-tooltip attr via pseudo-element */
#sidebar button::after{
  content:attr(data-tooltip);
  position:absolute;
  left:calc(100% + 8px);
  top:50%;
  transform:translateY(-50%);
  background:#050506;
  color:#fff;
  font-size:13px;
  padding:6px 8px;
  border-radius:6px;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  box-shadow:0 6px 22px rgba(0,0,0,0.6);
  transition:opacity 160ms ease, transform 160ms ease;
  transform-origin:left center;
  z-index:40;
}
#sidebar:not(.expanded) button:hover::after{ opacity:1; transform:translateY(-50%) translateX(0); }

/* toggle button sticky at bottom */
#toggleSidebar{
margin-bottom:6px;
}

/* -------------------------
   Layout
   ------------------------- */
#layout{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Header */
header{
  height:var(--header-h);
  background:linear-gradient(180deg,var(--panel-2),var(--panel));
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  gap:12px;
  flex-shrink:0;
}
header h1{ font-size:1rem; margin:0; letter-spacing:0.2px }
header .status{ color:var(--muted); font-size:0.85rem }

/* Footer */
footer{
  height:var(--footer-h);
  background:linear-gradient(180deg,var(--panel),#121314);
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--muted);
  font-size:0.82rem;
  flex-shrink:0;
}

/* Main content area */
main{
  flex:1;
  overflow:auto;
  padding:12px;
}

/* -------------------------
   Controls
   ------------------------- */
.controls-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-bottom:10px;
  flex-wrap:wrap;
}
select, input[type="text"], textarea {
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  color:var(--text);
  border:1px solid var(--border);
  padding:8px 10px;
  border-radius:8px;
  outline:none;
  min-height:40px;
  font-size:16px; /* prevent mobile zoom */
}
textarea{ min-height:88px; width:100%; resize:vertical; }
label.small{ font-size:0.85rem; color:var(--muted) }
.button {
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  transition:transform 80ms ease, opacity 120ms;
}
.button.positive{ background:var(--accent-2) }
.button:active{ transform:translateY(1px) }
.icon-btn{
  display:inline-flex; align-items:center; gap:8px; padding:8px 10px; background:transparent; border:1px solid var(--border); border-radius:8px; cursor:pointer; color:var(--text);
}

/* Column checkboxes mini */
#columnCheckboxes{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

/* Filters panel */
#filters{ display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 12px 0; }
.filter-pill{ background:linear-gradient(180deg,var(--panel-2),var(--panel)); padding:6px 8px; border-radius:8px; border:1px solid var(--border); color:var(--muted); font-size:0.9rem; }

/* -------------------------
   Table
   ------------------------- */
.table-wrapper{ overflow:auto; border-radius:8px; border:1px solid var(--border); background:linear-gradient(180deg,var(--panel-2),var(--panel)); }
#resultTable{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
  font-size:0.9rem;
}
#resultTable th, #resultTable td{
  padding:8px 10px;
  border-bottom:1px solid rgba(255,255,255,0.02);
  text-align:left;
  color:var(--text);
}
#resultTable th{
  position:sticky; top:0; background:linear-gradient(0deg,var(--accent),#3f4fe8); color:#fff; font-weight:600; z-index:5;
}
#resultTable tbody tr:hover{ background:rgba(255,255,255,0.02) }
td img{ max-width:64px; max-height:64px; object-fit:cover; display:block; }

/* -------------------------
   Chart
   ------------------------- */
#chartContainer{
  margin-top:12px;
  padding:12px;
  border-radius:8px;
  background:linear-gradient(180deg,var(--panel),var(--panel-2));
  border:1px solid var(--border);
}

/* Scrollbars (thin) */
::-webkit-scrollbar{ height:8px; width:8px }
::-webkit-scrollbar-thumb{ background:#2b2f33; border-radius:8px }
::-webkit-scrollbar-track{ background:transparent }

/* Responsive adjustments */
@media (max-width:720px){
  #sidebar.expanded{ width:170px }
  #resultTable{ min-width:450px }
}
td img{
width: 32px;
height:32px;
border-radius: 100%;
}
.table-wrapper{
max-height: 250px!important;
min-height: 250px!important;
height: 250px!important;
}

/* ---------- MODAL STYLES (new) ---------- */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  visibility: hidden;
  opacity: 0;
  transition: visibility 0.2s, opacity 0.2s;
}
.modal-overlay.active {
  visibility: visible;
  opacity: 1;
}
.modal-container {
  background: linear-gradient(145deg, var(--panel-2), var(--panel));
  border-radius: 16px;
  width: 90%;
  max-width: 750px;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border);
  box-shadow: 0 20px 35px rgba(0,0,0,0.5);
  animation: modalFadeIn 0.2s ease-out;
}
@keyframes modalFadeIn {
  from { transform: scale(0.96); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  border-radius: 16px 16px 0 0;
}
.modal-header h3 {
  margin: 0;
  font-weight: 600;
  font-size: 1.25rem;
  letter-spacing: -0.2px;
  color: var(--accent);
}
.modal-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 26px;
  line-height: 1;
  cursor: pointer;
  transition: color 0.2s;
  padding: 0 6px;
}
.modal-close:hover {
  color: #ff7b7b;
}
.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
.schema-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.9rem;
}
.schema-table th, .schema-table td {
  padding: 10px 8px;
  text-align: left;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.schema-table th {
  background: rgba(91,108,255,0.2);
  color: #cdd9ff;
  font-weight: 600;
}
.schema-table tr:hover td {
  background: rgba(255,255,255,0.02);
}
.badge-pk {
  background: #16a34a;
  color: white;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: bold;
  display: inline-block;
}
.badge-null {
  color: var(--muted);
  font-style: italic;
}
.modal-footer {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  text-align: right;
  font-size: 0.8rem;
  color: var(--muted);
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar" class="">
<button id="toggleSidebar" data-tooltip="Toggle Sidebar">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 12h16M4 6h16M4 18h16"/></svg>
    <span>Collapse</span>
  </button>
  <button data-action="employees" data-tooltip="Employees">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.5h19.2v-2.5c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    <span>Employees</span>
  </button>

  <button data-action="products" data-tooltip="Products">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3h18v4H3V3zm0 7h18v11H3V10z"/></svg>
    <span>Products</span>
  </button>

  <button data-action="orders" data-tooltip="Orders">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M21 7H3V5h18v2zm0 2H3v10h18V9z"/></svg>
    <span>Orders</span>
  </button>

  <button data-action="customers" data-tooltip="Customers">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.5h19.2v-2.5c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    <span>Customers</span>
  </button>

  <button data-action="categories" data-tooltip="Categories">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 5h8v8H3V5zm10 0h8v4h-8V5zm0 6h8v8h-8v-8zM3 15h8v4H3v-4z"/></svg>
    <span>Categories</span>
  </button>

  <button data-action="aggregates" data-tooltip="Aggregates">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 17h2v2H3v-2zm0-4h2v2H3v-2zm0-4h2v2H3V9zm0-4h2v2H3V5zm4 12h14v2H7v-2zm0-4h14v2H7v-2zm0-4h14v2H7v-2zm0-4h14v2H7V5z"/></svg>
    <span>Aggregates</span>
  </button>
</aside>

<!-- LAYOUT -->
<div id="layout">
  <header>
    <h1>Northwind Dashboard</h1>
    <div class="status">DB: <span id="dbStatus">loading...</span></div>
  </header>

  <main>
    <!-- Controls -->
    <div class="controls-row" style="align-items:center;">
      <select id="presetQuery" aria-label="Select table or aggregates" style="min-width:32%;width:32%;">
        <option value="">-- Select Table / Aggregates --</option>
      </select>
      <!-- NEW BUTTON: View Schema Modal -->
      <button id="viewSchemaBtn" class="button" style="background:#3c4053; white-space:nowrap;">📋 View Schema</button>
      <select id="columnSelect" multiple size="5" style="min-width:32%;width:32%;"></select>
      <input id="searchInput" type="text" placeholder="Filter rows..." style="flex:1; min-width:70px"/>
      <button id="runBtn" class="button">Run</button>
      <button id="exportCsvBtn" class="button positive">Export CSV</button>
    </div>

    <!-- Filters area -->
    <div id="filters" aria-live="polite" style="display: none;"></div>

    <!-- SQL editor -->
    <textarea id="sqlEditor" placeholder="Or type custom SQL here..."></textarea>

    <!-- Results table -->
    <div class="table-wrapper" style="margin-top:12px;">
      <table id="resultTable" aria-describedby="dbStatus">
        <thead id="resultHead"></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>

    <!-- Chart -->
    <div id="chartContainer">
      <canvas id="myChart" width="600" height="240" aria-label="Result chart"></canvas>
    </div>
  </main>

  
 <footer class="h-7 bg-slate-800/70 border-t border-slate-700 flex items-center justify-center text-[10px] text-slate-500 gap-2 flex-shrink-0 flex-nowrap justify-around">
<span><a href="northwindDB.html">New Dashboard</a></span>
<span>
  <i class="fas fa-image mr-1"></i> Northwind</span>
<span><a href="northwindViews.html">View Builder</a></span>
</footer>
</div>


<!-- MODAL: Schema Viewer (new) -->

<div id="schemaModal" class="modal-overlay">
  <div class="modal-container">
   
   <div class="modal-header">
      <h3 id="modalTableName">📄 Table Schema</h3>
      <button class="modal-close" id="closeModalBtn">&times;</button>
    </div>
    <div class="modal-body" id="schemaModalBody">
      <div style="text-align:center; padding:20px;">Loading schema...</div>
    </div>
    <div class="modal-footer">
      <span>Column details from database</span>
    </div>
  </div>
</div>

<script src="northwind.js"></script>

</body>
</html>
