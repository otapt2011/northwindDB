<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=auto, user-scalable=no">
  <title>Northwind · Tables & Views (Blob URL Images)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="assets/sql-wasm.js"></script>
  <script src="assets/chart.umd.min.js"></script>
  <style>
    html, body{height:100%;}
    * { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .compact-table td, .compact-table th { padding: 0.4rem 0.5rem; font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .compact-table th { background: rgba(59,130,246,0.2); position: sticky; top: 0; }
    .table-scroll-x { overflow-x: auto; max-height: 280px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #3b82f680; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s; }
    .modal.active { visibility: visible; opacity: 1; }
    .modal-content { background: #1e293b; border-radius: 1rem; width: 90%; max-width: 700px; max-height: 80vh; overflow: auto; padding: 1rem; }
    .schema-table td, .schema-table th { padding: 0.5rem; font-size: 0.7rem; border-bottom: 1px solid #334155; }
    .badge-pk { background: #10b981; padding: 2px 6px; border-radius: 20px; font-size: 0.65rem; }
    td img { max-width: 48px; max-height: 48px; border-radius: 4px; object-fit: cover; }
  </style>
</head>
<body class="bg-slate-900 text-slate-200 h-full flex flex-col overflow-hidden antialiased" style="padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);">

  <!-- Header -->
  <header class="h-12 bg-slate-800/90 backdrop-blur-sm border-b border-slate-700 flex items-center justify-between px-3 flex-shrink-0">
    <div class="flex items-center gap-2"><i class="fas fa-database text-indigo-400"></i><h1 class="font-semibold text-sm">Northwind · Tables & Views</h1></div>
    <div class="text-xs text-slate-400"><span id="dbStatus">loading...</span></div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar shortcuts -->
    <aside class="w-[42px] bg-slate-800/70 border-r border-slate-700 flex flex-col items-center py-2 gap-2 flex-shrink-0" id="sidebar"></aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto p-2 flex flex-col gap-2">
      <div class="flex flex-wrap items-center gap-1.5 bg-slate-800/40 p-1.5 rounded-lg border border-slate-700/60">
        <select id="tableSelect" class="bg-slate-700 border border-slate-600 rounded-md py-1.5 px-2 text-xs w-36"><option value="">-- Tables --</option></select>
        <select id="viewSelect" class="bg-slate-700 border border-slate-600 rounded-md py-1.5 px-2 text-xs w-36"><option value="">-- Views --</option></select>
        <select id="columnSelect" multiple size="1" class="bg-slate-700 border border-slate-600 rounded-md py-1.5 px-2 text-xs w-40" style="height: 32px;"></select>
        <div class="relative w-24">
          <input id="limitInput" type="number" value="500" min="1" max="10000" step="100" class="bg-slate-700 border border-slate-600 rounded-md py-1.5 px-2 text-xs w-full pl-8">
          <span class="absolute left-2 top-1/2 -translate-y-1/2 text-[9px] text-slate-400 pointer-events-none">LIMIT</span>
        </div>
        <div class="relative flex-1"><i class="fas fa-search absolute left-2 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i><input id="searchInput" type="text" placeholder="Filter rows..." class="w-full bg-slate-700 border border-slate-600 rounded-md py-1.5 pl-7 pr-2 text-xs"></div>
        <button id="runBtn" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-md text-xs"><i class="fas fa-play"></i> Run</button>
        <button id="exportCsvBtn" class="bg-emerald-700 hover:bg-emerald-600 px-3 py-1.5 rounded-md text-xs"><i class="fas fa-file-csv"></i> CSV</button>
        <button id="viewSchemaBtn" class="bg-slate-600 hover:bg-slate-500 px-2.5 py-1.5 rounded-md text-xs"><i class="fas fa-table-list"></i> Schema</button>
      </div>

      <textarea id="sqlEditor" rows="2" placeholder="-- Write custom SQL or leave empty to use selected columns" class="w-full bg-slate-800 border border-slate-700 rounded-md p-2 text-xs font-mono resize-none"></textarea>

      <div class="relative">
        <div id="loader" class="hidden absolute inset-0 bg-slate-900/60 flex items-center justify-center rounded-md z-10"><div class="spinner"></div></div>
        <div class="table-scroll-x rounded-md border border-slate-700 bg-slate-800/40">
          <table class="compact-table w-full"><thead id="resultHead"></thead><tbody id="resultBody"></tbody></table>
        </div>
      </div>

      <div id="chartSection" class="hidden bg-slate-800/40 rounded-md border border-slate-700 p-2"><canvas id="myChart" height="160"></canvas></div>
    </main>
  </div>

<footer class="h-7 bg-slate-800/70 border-t border-slate-700 flex items-center justify-center text-[10px] text-slate-500 gap-2 flex-shrink-0 flex-nowrap justify-around">
<span><a href="northwind.html">Old Dashboard</a></span>
<span>
<i class="fas fa-image mr-1"></i> Images rendered as blob URLs</span>
<span><a href="northwindViews.html">View Builder</a></span>
</footer>

  <!-- Schema Modal -->
  <div id="schemaModal" class="modal"><div class="modal-content"><div class="flex justify-between items-center mb-2"><h3 id="modalTitle" class="text-sm font-semibold">Schema</h3><button id="closeModalBtn" class="text-xl">&times;</button></div><div id="modalBody" class="text-xs overflow-auto max-h-[60vh]"></div></div></div>

  <script>
    let SQL, db, chart;
    let currentObject = null, currentType = null;
    let activeBlobUrls = []; // store generated blob URLs to revoke later

    // Revoke all previously created blob URLs to avoid memory leaks
    function revokeBlobUrls() {
      for (const url of activeBlobUrls) {
        URL.revokeObjectURL(url);
      }
      activeBlobUrls = [];
    }

    function execSafe(sql) {
      try { return db.exec(sql); } catch(e) { console.warn(e); return null; }
    }

    // Convert Uint8Array to Blob URL (original method but returns object URL)
    function uint8ArrayToBlobUrl(uint8Array, mimeType = 'image/bmp') {
      const blob = new Blob([uint8Array], { type: mimeType });
      const url = URL.createObjectURL(blob);
      activeBlobUrls.push(url);
      return url;
    }

    function renderResults(results) {
      // Clean up previous blob URLs
      revokeBlobUrls();

      const head = document.getElementById('resultHead');
      const body = document.getElementById('resultBody');
      head.innerHTML = '';
      body.innerHTML = '';
      if (!results || results.length === 0) {
        head.innerHTML = '<tr><th class="text-slate-400">—</th></tr>';
        body.innerHTML = '<tr><td class="text-center text-slate-500 text-xs">No rows returned</td></tr>';
        document.getElementById('chartSection').classList.add('hidden');
        return;
      }
      const r = results[0];
      const cols = r.columns;
      const rows = r.values;
      head.innerHTML = '<tr>' + cols.map(c => `<th class="text-xs font-semibold text-indigo-200">${escapeHtml(c)}</th>`).join('') + '</tr>';
      body.innerHTML = rows.map(row => '<tr>' + row.map(cell => {
        if (cell instanceof Uint8Array) {
          try {
            // Try to create blob URL (assume BMP as in original Northwind)
            const blobUrl = uint8ArrayToBlobUrl(cell, 'image/bmp');
            return `<td class="align-middle"><img src="${blobUrl}" class="w-8 h-8 rounded object-cover" alt="image" onerror="this.onerror=null; this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%236b7280%22%3E%3Cpath d=%22M4 4h16v16H4z%22/%3E%3C/svg%3E'; this.classList.add('w-5','h-5');"></td>`;
          } catch(e) {
            return '<td>[binary]</td>';
          }
        }
        let display = (cell === undefined || cell === null) ? '' : cell;
        if (typeof display === 'string' && display.length > 100) display = display.slice(0, 100) + '…';
        return `<td class="truncate max-w-[180px]" title="${escapeHtml(String(display))}">${escapeHtml(String(display))}</td>`;
      }).join('') + '</tr>').join('');

      // Auto chart if second column is numeric
      if (cols.length >= 2 && rows.length && !isNaN(parseFloat(rows[0][1]))) {
        const labels = rows.map(r => r[0]);
        const data = rows.map(r => parseFloat(r[1]) || 0);
        const ctx = document.getElementById('myChart').getContext('2d');
        if (chart) chart.destroy();
        chart = new Chart(ctx, {
          type: 'bar',
          data: { labels, datasets: [{ label: cols[1], data, backgroundColor: 'rgba(99,102,241,0.7)' }] },
          options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#cbd5e1', font: { size: 10 } } } }, scales: { x: { ticks: { color: '#94a3b8', font: { size: 9 } } }, y: { ticks: { color: '#94a3b8', font: { size: 9 } } } } }
        });
        document.getElementById('chartSection').classList.remove('hidden');
      } else {
        document.getElementById('chartSection').classList.add('hidden');
        if (chart) { chart.destroy(); chart = null; }
      }
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function buildQuery() {
      if (!currentObject) return document.getElementById('sqlEditor').value.trim();
      const selected = Array.from(document.getElementById('columnSelect').selectedOptions).map(o => `"${o.value.replace(/"/g, '""')}"`);
      const selectPart = selected.length ? selected.join(', ') : '*';
      let sql = `SELECT ${selectPart} FROM "${currentObject.replace(/"/g, '""')}"`;
      const limit = parseInt(document.getElementById('limitInput').value, 10);
      if (limit && !isNaN(limit) && limit > 0) sql += ` LIMIT ${limit}`;
      return sql;
    }

    async function runQuery() {
      if (!db) return;
      const loader = document.getElementById('loader');
      loader.classList.remove('hidden');
      setTimeout(() => {
        try {
          let sql = document.getElementById('sqlEditor').value.trim();
          if (!sql) sql = buildQuery();
          if (!sql) throw new Error('No query');
          const results = execSafe(sql);
          renderResults(results);
        } catch (err) {
          document.getElementById('resultHead').innerHTML = '<tr><th>Error</th></tr>';
          document.getElementById('resultBody').innerHTML = `<tr><td class="text-red-400 text-xs">${escapeHtml(err.message)}</td></tr>`;
          document.getElementById('chartSection').classList.add('hidden');
        } finally {
          loader.classList.add('hidden');
        }
      }, 10);
    }

    function updateColumnSelector(objName) {
      const colSelect = document.getElementById('columnSelect');
      colSelect.innerHTML = '';
      if (!objName) {
        colSelect.innerHTML = '<option disabled>—</option>';
        return;
      }
      const pragma = execSafe(`PRAGMA table_info("${objName.replace(/"/g, '""')}")`);
      if (pragma && pragma[0]) {
        pragma[0].values.forEach(col => {
          const opt = document.createElement('option');
          opt.value = col[1];
          opt.textContent = col[1];
          opt.selected = true;
          colSelect.appendChild(opt);
        });
      } else {
        colSelect.innerHTML = '<option disabled>Could not load columns</option>';
      }
    }

    function refreshFromCurrentSelection() {
      const tableVal = document.getElementById('tableSelect').value;
      const viewVal = document.getElementById('viewSelect').value;
      if (viewVal) {
        currentObject = viewVal;
        currentType = 'view';
        document.getElementById('tableSelect').value = '';
      } else if (tableVal) {
        currentObject = tableVal;
        currentType = 'table';
        document.getElementById('viewSelect').value = '';
      } else {
        currentObject = null;
        currentType = null;
        document.getElementById('columnSelect').innerHTML = '<option disabled>—</option>';
        document.getElementById('resultHead').innerHTML = '';
        document.getElementById('resultBody').innerHTML = '';
        return;
      }
      document.getElementById('sqlEditor').value = '';
      updateColumnSelector(currentObject);
      runQuery();
    }

    function populateDropdowns() {
      const tableSelect = document.getElementById('tableSelect');
      const viewSelect = document.getElementById('viewSelect');
      const tablesRes = execSafe("SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%' ORDER BY name");
      tableSelect.innerHTML = '<option value="">-- Tables --</option>';
      if (tablesRes && tablesRes[0]) {
        tablesRes[0].values.forEach(row => {
          const opt = document.createElement('option');
          opt.value = row[0];
          opt.textContent = row[0];
          tableSelect.appendChild(opt);
        });
      }
      const viewsRes = execSafe("SELECT name FROM sqlite_master WHERE type='view' ORDER BY name");
      viewSelect.innerHTML = '<option value="">-- Views --</option>';
      if (viewsRes && viewsRes[0] && viewsRes[0].values.length) {
        viewsRes[0].values.forEach(row => {
          const opt = document.createElement('option');
          opt.value = row[0];
          opt.textContent = row[0];
          viewSelect.appendChild(opt);
        });
      } else {
        const noOpt = document.createElement('option');
        noOpt.disabled = true;
        noOpt.textContent = 'No views yet';
        viewSelect.appendChild(noOpt);
      }
      buildSidebarShortcuts(tablesRes, viewsRes);
    }

    function buildSidebarShortcuts(tablesRes, viewsRes) {
      const sidebar = document.getElementById('sidebar');
      sidebar.innerHTML = '';
      const shortcuts = [];
      if (tablesRes && tablesRes[0]) {
        tablesRes[0].values.slice(0, 4).forEach(t => shortcuts.push({ name: t[0], type: 'table' }));
      }
      if (viewsRes && viewsRes[0]) {
        viewsRes[0].values.slice(0, 4).forEach(v => shortcuts.push({ name: v[0], type: 'view' }));
      }
      shortcuts.slice(0, 6).forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'hover:text-indigo-300 p-1.5';
        btn.title = item.name;
        btn.innerHTML = `<i class="fas ${item.type === 'table' ? 'fa-table' : 'fa-eye'} text-base"></i>`;
        btn.addEventListener('click', () => {
          if (item.type === 'table') {
            document.getElementById('tableSelect').value = item.name;
            document.getElementById('viewSelect').value = '';
          } else {
            document.getElementById('viewSelect').value = item.name;
            document.getElementById('tableSelect').value = '';
          }
          refreshFromCurrentSelection();
        });
        sidebar.appendChild(btn);
      });
      if (shortcuts.length === 0) {
        sidebar.innerHTML = '<div class="text-[10px] text-slate-500 rotate-90 whitespace-nowrap mt-4">none</div>';
      }
    }

    function showSchema() {
      if (!currentObject) {
        document.getElementById('modalBody').innerHTML = '<div class="text-amber-400">Select a table or view first</div>';
        document.getElementById('schemaModal').classList.add('active');
        return;
      }
      document.getElementById('modalTitle').innerHTML = `Schema: ${currentObject} (${currentType})`;
      document.getElementById('modalBody').innerHTML = '<div class="spinner mx-auto"></div>';
      document.getElementById('schemaModal').classList.add('active');
      setTimeout(() => {
        const quoted = `"${currentObject.replace(/"/g, '""')}"`;
        const pragma = execSafe(`PRAGMA table_info(${quoted})`);
        if (pragma && pragma[0]) {
          let html = `<table class="schema-table w-full"><thead><tr><th>Column</th><th>Type</th><th>Nullable</th><th>PK</th></tr></thead><tbody>`;
          pragma[0].values.forEach(col => {
            html += `<tr><td class="font-mono">${escapeHtml(col[1])}</td><td>${escapeHtml(col[2])}</td><td>${col[3] ? 'NOT NULL' : 'NULL'}</td><td>${col[5] ? '<span class="badge-pk">PK</span>' : ''}</td></tr>`;
          });
          html += `</tbody></table>`;
          if (currentType === 'view') {
            const viewSqlRes = execSafe(`SELECT sql FROM sqlite_master WHERE type='view' AND name = ${quoted}`);
            if (viewSqlRes && viewSqlRes[0] && viewSqlRes[0].values.length) {
              const sqlText = viewSqlRes[0].values[0][0];
              html += `<div class="mt-3"><strong>View Definition:</strong><pre class="bg-slate-900 p-2 rounded text-[0.65rem] mt-1 overflow-auto">${escapeHtml(sqlText)}</pre></div>`;
            }
          }
          document.getElementById('modalBody').innerHTML = html;
        } else {
          document.getElementById('modalBody').innerHTML = '<div class="text-red-400">Could not retrieve schema</div>';
        }
      }, 20);
    }

    function closeModal() { document.getElementById('schemaModal').classList.remove('active'); }

    function exportCsv() {
      const headers = Array.from(document.querySelectorAll('#resultHead th')).map(th => `"${th.innerText.replace(/"/g, '""')}"`);
      const rows = Array.from(document.querySelectorAll('#resultBody tr'));
      let csv = headers.join(',') + '\n';
      rows.forEach(tr => {
        const cols = Array.from(tr.querySelectorAll('td')).map(td => `"${td.innerText.replace(/"/g, '""')}"`);
        csv += cols.join(',') + '\n';
      });
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'export.csv';
      a.click();
      URL.revokeObjectURL(blob);
    }

    async function init() {
      try {
        SQL = await initSqlJs({ locateFile: file => file === 'sql-wasm.wasm' ? 'assets/sql-wasm.wasm' : file });
        const resp = await fetch('assets/northwind.db');
        const ab = await resp.arrayBuffer();
        db = new SQL.Database(new Uint8Array(ab));
        document.getElementById('dbStatus').innerHTML = '<i class="fas fa-check-circle text-emerald-400"></i> ready';
        populateDropdowns();
        const firstTable = document.getElementById('tableSelect').querySelector('option:not([disabled])');
        if (firstTable && firstTable.value) {
          document.getElementById('tableSelect').value = firstTable.value;
          refreshFromCurrentSelection();
        } else {
          const firstView = document.getElementById('viewSelect').querySelector('option:not([disabled])');
          if (firstView && firstView.value) {
            document.getElementById('viewSelect').value = firstView.value;
            refreshFromCurrentSelection();
          }
        }
      } catch(e) {
        console.error(e);
        document.getElementById('dbStatus').innerHTML = '<i class="fas fa-exclamation-triangle text-amber-400"></i> error';
      }
    }

    // Event binding
    document.getElementById('tableSelect').addEventListener('change', () => {
      if (document.getElementById('tableSelect').value) {
        document.getElementById('viewSelect').value = '';
        refreshFromCurrentSelection();
      } else if (!document.getElementById('viewSelect').value) {
        refreshFromCurrentSelection();
      }
    });
    document.getElementById('viewSelect').addEventListener('change', () => {
      if (document.getElementById('viewSelect').value) {
        document.getElementById('tableSelect').value = '';
        refreshFromCurrentSelection();
      } else if (!document.getElementById('tableSelect').value) {
        refreshFromCurrentSelection();
      }
    });
    document.getElementById('runBtn').addEventListener('click', runQuery);
    document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
    document.getElementById('viewSchemaBtn').addEventListener('click', showSchema);
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.getElementById('schemaModal').addEventListener('click', (e) => { if (e.target === document.getElementById('schemaModal')) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && document.getElementById('schemaModal').classList.contains('active')) closeModal(); });
    document.getElementById('searchInput').addEventListener('input', function() {
      const term = this.value.toLowerCase();
      document.querySelectorAll('#resultBody tr').forEach(tr => {
        tr.style.display = tr.innerText.toLowerCase().includes(term) ? '' : 'none';
      });
    });

    init();
  </script>
</body>
</html>
